name: Deploy TrustCheck Nigeria

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and push frontend
        run: |
          docker build -t kaphaaya/trustcheck-frontend:latest ./frontend
          docker push kaphaaya/trustcheck-frontend:latest

      - name: 🏗️ Build and push backend
        run: |
          docker build -t kaphaaya/trustcheck-backend:latest ./backend
          docker push kaphaaya/trustcheck-backend:latest

      - name: 🚀 Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd trustcheck-nigeria
            git pull
            docker-compose down
            docker-compose up -d --build